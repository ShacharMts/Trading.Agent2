<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Recommendation Portal</title>
  <link rel="stylesheet" href="/static/style.css?v=3">
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<header>
  <h1>Trading Recommendations</h1>
</header>

<main>
  <!-- Filters -->
  <section id="filters">
    <div class="filter-row">
      <label>Symbols <input type="number" id="numSymbols" min="1" max="10" value="10"></label>
      <label>Hold (days) <input type="number" id="holdDays" min="1" max="30" value="14"></label>
      <label>Profit % <input type="number" id="profitTarget" min="1" max="30" step="0.5" value="5"></label>
      <label>SMA
        <select id="smaFilter">
          <option value="0">None</option>
          <option value="20">20</option>
          <option value="50">50</option>
          <option value="100" selected>100</option>
        </select>
      </label>
      <label>Volatility
        <select id="volFilter">
          <option value="None">None</option>
          <option value="Low" selected>Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </label>
      <label>Data Cutoff <input type="date" id="cutoffDate"></label>
      <button id="generateBtn">Generate</button>
    </div>
  </section>

  <!-- Status -->
  <div id="status" class="hidden"></div>

  <!-- Results Table -->
  <section id="results" class="hidden">
    <div id="savedBanner" class="saved-banner hidden"></div>
    <div class="section-header">
      <h2>Recommendations</h2>
      <button id="saveBtn" class="btn-save">Save</button>
    </div>
    <div class="table-wrap">
      <table id="recTable">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Symbol</th>
            <th>Current Price</th>
            <th>Score</th>
            <th>Target Price</th>
            <th>Stop-Loss</th>
            <th>Expected Profit</th>
            <th>YTD %</th>
            <th>Last Month %</th>
            <th>Volatility</th>
            <th></th>
            <th>Chart</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- Chart -->
  <section id="chartSection" class="hidden">
    <div class="section-header">
      <div>
        <h2 id="chartTitle">Chart</h2>
        <div id="liveQuote" class="live-quote"></div>
      </div>
      <div class="chart-buttons">
        <div class="chart-type-toggle">
          <button class="type-btn active" data-type="candle">Candlestick</button>
          <button class="type-btn" data-type="line">Line</button>
        </div>
        <div class="chart-period-btns">
          <button class="period-btn active" data-period="1m">1M</button>
          <button class="period-btn" data-period="1w">1W</button>
          <button class="period-btn" data-period="ytd">YTD</button>
        </div>
      </div>
    </div>
    <div id="priceChart"></div>
  </section>

  <!-- Saved Recommendations -->
  <section id="historySection">
    <h2>Saved Recommendations</h2>
    <div id="historyList"><p class="muted">No saved recommendations yet.</p></div>
  </section>
</main>

<!-- Symbol Info Modal -->
<div id="infoModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2 id="infoModalTitle">Symbol Info</h2>
      <button id="infoModalClose" class="modal-close">&times;</button>
    </div>
    <div id="infoModalBody" class="modal-body">
      <p class="muted">Loading...</p>
    </div>
  </div>
</div>

<script src="/static/app.js?v=4"></script>
</body>
</html>
